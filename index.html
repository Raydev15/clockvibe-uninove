<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClockVibe Pro — Portal Uninove</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { background: #111; padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0, 242, 255, 0.1); max-width: 600px; width: 90%; border: 1px solid rgba(0, 242, 255, 0.2); }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 10px; }
        p { margin-bottom: 40px; color: rgba(255,255,255,0.6); }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 600; transition: 0.3s; border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { background: var(--accent); color: #000; transform: translateY(-3px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClockVibe ⚡</h1>
        <p>Projeto de ADS — 1º Semestre Uninove<br>Selecione a versão que deseja visualizar:</p>
        <div class="links">
            <a href="v1-inicio/index.html" class="btn">Versão 1: Início (Básico)</a>
            <a href="v2-intermediaria/index.html" class="btn">Versão 2: Intermediária (Completo)</a>
            <a href="v3-pro/index.html" class="btn">Versão 3: Pro (Temas & PWA)</a>
        </div>
        <div class="footer">© 2026 — Raydev15 | Uninove ADS</div>
    </div>
</body>
</html>
