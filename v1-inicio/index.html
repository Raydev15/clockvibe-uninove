<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClockVibe v1 — Início</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050505; color: #00f2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .clock-container { text-align: center; padding: 40px; border: 2px solid #00f2ff; border-radius: 20px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .time { font-size: 5rem; font-weight: bold; margin-bottom: 10px; }
        .date { font-size: 1.5rem; color: #fff; opacity: 0.8; }
        .theme-btn { margin-top: 30px; padding: 10px 20px; background: #00f2ff; color: #050505; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        footer { position: absolute; bottom: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">01 de Janeiro de 2026</div>
        <button class="theme-btn" onclick="toggleTheme()">Mudar Tema</button>
    </div>
    <footer>&copy; 2026 ClockVibe - Projeto Uninove v1</footer>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('pt-BR');
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', { dateStyle: 'full' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleTheme() {
            const body = document.body;
            if (body.style.backgroundColor === 'white') {
                body.style.backgroundColor = '#050505';
                body.style.color = '#00f2ff';
            } else {
                body.style.backgroundColor = 'white';
                body.style.color = '#333';
            }
        }
    </script>
</body>
</html>
